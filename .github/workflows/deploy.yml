name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Enable Web
        run: flutter config --enable-web

      - name: Create secrets.json from GitHub Secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
          WEB_AUTH_REDIRECT_URL: https://${{ github.repository_owner }}.github.io/ai_health_coach/
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 -c "
          import json, os
          json.dump({
            'SUPABASE_URL': os.environ['SUPABASE_URL'].strip(),
            'SUPABASE_ANON_KEY': os.environ['SUPABASE_ANON_KEY'].strip(),
            'GOOGLE_WEB_CLIENT_ID': os.environ['GOOGLE_WEB_CLIENT_ID'].strip(),
            'WEB_AUTH_REDIRECT_URL': os.environ['WEB_AUTH_REDIRECT_URL'].strip(),
            'GEMINI_API_KEY': os.environ['GEMINI_API_KEY'].strip(),
          }, open('secrets.json', 'w'))
          "

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web
        run: |
          flutter build web \
            --base-href "/ai_health_coach/" \
            --release \
            --dart-define-from-file=secrets.json
          cp build/web/index.html build/web/404.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
